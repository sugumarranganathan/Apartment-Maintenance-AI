<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apartment Maintenance AI</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="container">

        <h1>🏢 Apartment Maintenance AI</h1>

        <p class="subtitle">
            Describe your apartment maintenance issue and let AI generate a maintenance ticket.
        </p>

        <div class="card">

            <textarea
                id="complaint"
                placeholder="Example: Water is leaking from the kitchen sink and flooding the floor..."
            ></textarea>

            <button id="submitBtn" onclick="submitComplaint()">
                Generate Maintenance Ticket
            </button>

        </div>

        <div id="loading" class="loading">
            ⏳ Analyzing your complaint...
        </div>

        <div id="result" class="result" style="display: none;">

            <h2>Maintenance Ticket</h2>

            <table>

                <tr>
                    <th>Category</th>
                    <td id="category">-</td>
                </tr>

                <tr>
                    <th>Priority</th>
                    <td id="priority">-</td>
                </tr>

                <tr>
                    <th>Technician</th>
                    <td id="technician">-</td>
                </tr>

                <tr>
                    <th>Estimated Time</th>
                    <td id="time">-</td>
                </tr>

                <tr>
                    <th>Summary</th>
                    <td id="summary">-</td>
                </tr>

            </table>

        </div>

    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>

</body>

</html>
